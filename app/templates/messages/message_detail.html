{% extends "uxbase.html" %}

{% block title %}Private Message{% endblock %}
{% block head %}
{{ super() }}
<style>
  :root {
    --sb-brand-blue-1: #5267ec;
    --sb-brand-blue-2: #5369ec;
    --sb-panel: #121a33;
    --sb-panel-border: #2f3d67;
    --sb-text-main: #eef2ff;
    --sb-text-sub: #bcc7ec;
  }

  .center-text {
    max-width: 880px;
    margin: 0 auto;
    padding: 18px;
    border: 1px solid var(--sb-panel-border);
    border-radius: 16px;
    background: var(--sb-panel);
    box-shadow: 0 14px 34px rgba(0, 0, 0, 0.42);
  }

  .center-text > * {
    margin-top: 0;
    margin-bottom: 0;
  }

  .center-text > * + * {
    margin-top: 12px;
  }

  h1, h2, h3, h4, h5, p, span, a, label {
    color: #e8f0f4;
  }

  .btn-stack {
    display: grid;
    gap: 6px;
    margin-top: 8px;
  }

  button {
    background: linear-gradient(135deg, var(--sb-brand-blue-1), var(--sb-brand-blue-2));
    color: #ffffff;
    border: 0;
    border-radius: 12px;
    font-weight: 600;
    font-family: "Inter", "Trebuchet MS", Tahoma, sans-serif;
    width: 90%;
    display: block;
    margin-left: auto;
    margin-right: auto;
    box-sizing: border-box;
    padding: 10px 12px;
  }

  .btn-stack button {
    margin-top: 0 !important;
  }

  #card-container {
    max-width: 880px;
    margin: 14px auto;
    display: grid;
    gap: 12px;
  }

  .card {
    border: 1px solid #3c518b;
    border-radius: 12px;
    background: #0d1430;
    padding: 12px 14px;
    transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
  }

  .card-title {
    color: var(--sb-text-main);
    font-weight: 700;
  }

  .card-content {
    color: var(--sb-text-sub);
    margin-top: 6px;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }

  @media (max-width: 700px) {
    .center-text {
      padding: 14px;
    }
    button {
      width: 100%;
    }
  }
</style>
<script>
function goBack() {
  window.history.back();
}

function backToMessages() {
  window.location.href = "/safebox/personalmessages";
}

function backToProfile() {
  window.location.href = "/safebox/access";
}
</script>
{% endblock %}

{% block page_content %}
<div class="center-text">
  <h1>Private Message</h1>
  <div class="btn-stack">
    <button onclick="goBack()">Back</button>
    <button onclick="backToMessages()">All Messages</button>
  </div>
</div>

<div id="card-container"></div>

<script>
const message = {{ message | tojson }};

function senderLabel(record) {
  if (record.social_name && String(record.social_name).trim() !== "") return record.social_name;
  return "Unknown sender";
}

function payloadText(record) {
  const value = (record && (record.payload ?? record.content)) ?? "";
  if (value && typeof value === "object") {
    return JSON.stringify(value, null, 2);
  }
  return String(value);
}

function addDetailCard(record) {
  const card = document.createElement("div");
  card.className = "card";

  const title = document.createElement("div");
  title.className = "card-title";
  title.textContent = senderLabel(record);

  const createdAt = document.createElement("div");
  createdAt.className = "card-content";
  createdAt.textContent = record.created_at || "";

  const idNode = document.createElement("div");
  idNode.className = "card-content";
  idNode.textContent = `id: ${record.id || ""}`;

  const body = document.createElement("pre");
  body.className = "card-content";
  body.style.whiteSpace = "pre-wrap";
  body.style.wordBreak = "break-word";
  body.textContent = payloadText(record);

  card.appendChild(title);
  card.appendChild(createdAt);
  card.appendChild(idNode);
  card.appendChild(body);
  document.getElementById("card-container").appendChild(card);
}

addDetailCard(message);
setDarkMode();
</script>

<div class="center-text">
  <div class="btn-stack">
    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
    <button onclick="backToProfile()">Home</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
{% endblock %}
