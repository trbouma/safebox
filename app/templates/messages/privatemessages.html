{% extends "uxbase.html" %}

{% block title %}Private Messages{% endblock %}
{% block head %}
{{ super() }}
<style>
  :root {
    --sb-brand-blue-1: #5267ec;
    --sb-brand-blue-2: #5369ec;
    --sb-panel: #121a33;
    --sb-panel-border: #2f3d67;
    --sb-text-main: #eef2ff;
    --sb-text-sub: #bcc7ec;
  }

  .center-text {
    max-width: 880px;
    margin: 0 auto;
    padding: 18px;
    border: 1px solid var(--sb-panel-border);
    border-radius: 16px;
    background: var(--sb-panel);
    box-shadow: 0 14px 34px rgba(0, 0, 0, 0.42);
  }

  .center-text > * {
    margin-top: 0;
    margin-bottom: 0;
  }

  .center-text > * + * {
    margin-top: 12px;
  }

  h1, h2, h3, h4, h5, p, span, a, label {
    color: #e8f0f4;
  }

  .btn-stack {
    display: grid;
    gap: 6px;
    margin-top: 8px;
  }

  button {
    background: linear-gradient(135deg, var(--sb-brand-blue-1), var(--sb-brand-blue-2));
    color: #ffffff;
    border: 0;
    border-radius: 12px;
    font-weight: 600;
    font-family: "Inter", "Trebuchet MS", Tahoma, sans-serif;
    width: 90%;
    display: block;
    margin-left: auto;
    margin-right: auto;
    box-sizing: border-box;
    padding: 10px 12px;
  }

  .btn-stack button {
    margin-top: 0 !important;
  }

  #card-container {
    max-width: 880px;
    margin: 14px auto;
    display: grid;
    gap: 12px;
  }

  .card {
    border: 1px solid #3c518b;
    border-radius: 12px;
    background: #0d1430;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
  }

  .card:hover {
    border-color: var(--sb-brand-blue-1);
    background: #101940;
    transform: translateY(-1px);
  }

  .card-title {
    color: var(--sb-text-main);
    font-weight: 700;
  }

  .card-content {
    color: var(--sb-text-sub);
    margin-top: 6px;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }

  .hint {
    color: var(--sb-text-sub);
  }

  @media (max-width: 700px) {
    .center-text {
      padding: 14px;
    }
    button {
      width: 100%;
    }
  }
</style>
<script>
function goBack() {
  window.history.back();
}

function backToProfile() {
  window.location.href = "/safebox/access";
}

function createNewMessage() {
  window.location.href = "/safebox/displaymessage?action_mode=add";
}
</script>
{% endblock %}

{% block page_content %}
<div class="center-text">
  <h1>Private Messages</h1>
  <div class="btn-stack">
    <button onclick="goBack()">Back</button>
    <button onclick="createNewMessage()">New Message</button>
  </div>
  <p class="hint">Messages are shown newest first.</p>
</div>

<div id="card-container"></div>

<script>
const jsonUserData = {{ user_records | tojson }};

function formatSender(record) {
  if (record.social_name && String(record.social_name).trim() !== "") return record.social_name;
  if (record.presenter && String(record.presenter).trim() !== "") return record.presenter;
  if (record.sender && String(record.sender).trim() !== "") return record.sender;
  if (record.pubkey && String(record.pubkey).trim() !== "") return record.pubkey;
  return "Unknown sender";
}

function previewText(text, maxLen = 180) {
  const value = String(text || "");
  if (value.length <= maxLen) return value;
  return value.slice(0, maxLen) + "...";
}

function addMessageCard(record) {
  const card = document.createElement("div");
  card.className = "card";

  const title = document.createElement("div");
  title.className = "card-title";
  title.textContent = formatSender(record);

  const createdAt = document.createElement("div");
  createdAt.className = "card-content";
  createdAt.textContent = record.created_at || "";

  const content = document.createElement("div");
  content.className = "card-content";
  content.textContent = previewText(record.payload || record.content || "");

  card.appendChild(title);
  card.appendChild(createdAt);
  card.appendChild(content);

  card.addEventListener("click", () => {
    const id = encodeURIComponent(String(record.id || ""));
    window.location.href = `/safebox/messagedetail?message_id=${id}&kind=1059`;
  });

  document.getElementById("card-container").appendChild(card);
}

if (!Array.isArray(jsonUserData) || jsonUserData.length === 0) {
  const empty = document.createElement("div");
  empty.className = "center-text";
  empty.textContent = "No private messages found.";
  document.getElementById("card-container").appendChild(empty);
} else {
  for (const record of jsonUserData) {
    addMessageCard(record);
  }
}

setDarkMode();
</script>

<div class="center-text">
  <div class="btn-stack">
    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
    <button onclick="backToProfile()">Home</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
{% endblock %}
