{% extends "uxbase.html" %}

{% block title %}Private Messages{% endblock %}
{% block head %}
{{ super() }}
<script>
function goBack() {
  window.history.back();
}

function backToProfile() {
  window.location.href = "/safebox/access";
}

function createNewMessage() {
  window.location.href = "/safebox/displaymessage?action_mode=add";
}
</script>
{% endblock %}

{% block page_content %}
<div class="center-text">
  <h1>Private Messages</h1>
  <button onclick="goBack()">Back</button>
  <br><br>
  <button onclick="createNewMessage()">New Message</button>
  <br><br>
  Messages are shown newest first.
</div>

<div id="card-container"></div>

<script>
const jsonUserData = {{ user_records | tojson }};

function formatSender(record) {
  if (record.social_name && String(record.social_name).trim() !== "") return record.social_name;
  if (record.presenter && String(record.presenter).trim() !== "") return record.presenter;
  if (record.sender && String(record.sender).trim() !== "") return record.sender;
  if (record.pubkey && String(record.pubkey).trim() !== "") return record.pubkey;
  return "Unknown sender";
}

function previewText(text, maxLen = 180) {
  const value = String(text || "");
  if (value.length <= maxLen) return value;
  return value.slice(0, maxLen) + "...";
}

function addMessageCard(record) {
  const card = document.createElement("div");
  card.className = "card";

  const title = document.createElement("div");
  title.className = "card-title";
  title.textContent = formatSender(record);

  const createdAt = document.createElement("div");
  createdAt.className = "card-content";
  createdAt.textContent = record.created_at || "";

  const content = document.createElement("div");
  content.className = "card-content";
  content.textContent = previewText(record.payload || record.content || "");

  card.appendChild(title);
  card.appendChild(createdAt);
  card.appendChild(content);

  card.addEventListener("click", () => {
    const id = encodeURIComponent(String(record.id || ""));
    window.location.href = `/safebox/messagedetail?message_id=${id}&kind=1059`;
  });

  document.getElementById("card-container").appendChild(card);
}

if (!Array.isArray(jsonUserData) || jsonUserData.length === 0) {
  const empty = document.createElement("div");
  empty.className = "center-text";
  empty.textContent = "No private messages found.";
  document.getElementById("card-container").appendChild(empty);
} else {
  for (const record of jsonUserData) {
    addMessageCard(record);
  }
}

setDarkMode();
</script>

<div class="center-text">
  <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
  <br><br>
  <button onclick="backToProfile()">Home</button>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
{% endblock %}
